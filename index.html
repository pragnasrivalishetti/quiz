<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Development Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">

    <!-- START SCREEN -->
    <div id="start-screen">
        <h1>Web Development Quiz</h1>
        <p>Test your HTML, CSS and JavaScript knowledge</p>
        <button id="start-btn">Start Quiz</button>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="hide">

        <div class="quiz-header">
            <span id="question-number"></span>
            <span id="answered-count"></span>
        </div>

        <h2 id="question"></h2>

        <div id="answer-buttons"></div>

        <div class="navigation">
            <button id="previous-btn">Previous</button>
            <button id="next-btn">Save & Next</button>
        </div>

        <button id="submit-btn">Submit Quiz</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="hide">

        <div class="success-icon">✓</div>

        <h1>Thank You!</h1>

        <p>Your quiz has been completed successfully.</p>

        <h2 id="final-score"></h2>

        <div id="reward"></div>

        <button id="view-answers-btn">View Answers</button>

        <div id="review-container" class="hide"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
