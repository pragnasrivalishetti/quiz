<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML CSS JavaScript Quiz</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="quiz-box">

        <h1>Frontend Interview Quiz</h1>

        <div class="progress">
            Question <span id="current">1</span> of <span id="total">5</span>
        </div>

        <div id="question" class="question"></div>

        <div id="options" class="options"></div>

        <button id="nextBtn">Next Question</button>

        <h2 id="score"></h2>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
